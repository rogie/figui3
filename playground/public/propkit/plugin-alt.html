      html,

        padding: 0;
        height: auto;
        min-height: 0;
        background: transparent;
      }

      body {
        display: block;
      }

      #plugin-root {
        height: auto;
      }

      fig-field.group-tabs-field {
        --fig-field-left-padding: var(--spacer-2);
        --fig-field-right-padding: var(--spacer-2);
      }

      fig-field.group-tabs-field fig-tabs.group-tabs > .fig-tabs-scroll {
        padding-left: 0;
      }

      .result-summary {
        color: var(--figma-color-text-secondary);
      }

      fig-chooser.character-grid {
        max-height: 320px;
        min-height: 0;
        overflow: hidden;
      }

      fig-chooser.character-grid > .fig-chooser-scroll {
        align-content: start;
        max-height: 320px;
        min-height: 0;
        overflow-y: auto;
      }

      fig-chooser.character-grid fig-choice.character-tile {
        font-size: 14px;
        line-height: 16px;
        width: 100%;
        aspect-ratio: 1 / 1;
      }

      fig-chooser.character-grid fig-choice.character-tile fig-tooltip {
        display: contents;
      }

      fig-chooser.character-grid fig-choice.character-tile .character-content {
        align-items: center;
        display: flex;
        flex-direction: column;
        font-size: 24px;
        gap: 2px;
        justify-content: center;
        line-height: 1.1;
        min-width: 0;
        width: 100%;
        aspect-ratio: 1 / 1;
      }

      fig-chooser.character-grid fig-choice.character-tile .character-symbol {
        font-size: inherit;
        font-weight: 500;
        line-height: inherit;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty-state {
        color: var(--figma-color-text-secondary);
        font: var(--body-small-font);
        padding: 0 16px 16px;
      }
    </style>
    <script type="module">
      const FRAME_ID = (() => {
        try {
          return new URLSearchParams(location.search).get("frameId") || "";
        } catch {
          return "";
        }
      })();

      let lastHeight = 0;
      let lastWidth = 0;
      let rafId = 0;

      const measure = () => {
        const root = document.getElementById("plugin-root");
        if (!root) return { height: 0, width: 0 };
        const rect = root.getBoundingClientRect();
        let height = Math.ceil(rect.height);
        const dialog = document.querySelector("dialog.fig-fill-picker-dialog[open]");
        if (dialog) {
          const dialogBottom = Math.ceil(dialog.getBoundingClientRect().bottom + 12);
          height = Math.max(height, dialogBottom);
        }
        return { height, width: Math.ceil(rect.width) };
      };

      const send = () => {
        rafId = 0;
        const { width, height } = measure();
        if (height === lastHeight && width === lastWidth) return;
        lastHeight = height;
        lastWidth = width;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            { type: "figui:iframe-resize", frameId: FRAME_ID, width, height },
            "*",
          );
        }
      };

      const scheduleSend = () => {
        if (rafId) return;
        rafId = requestAnimationFrame(send);
      };

      const root = document.getElementById("plugin-root");
      if (root && typeof ResizeObserver !== "undefined") {
        new ResizeObserver(scheduleSend).observe(root);
      }

      if (typeof MutationObserver !== "undefined") {
        new MutationObserver(scheduleSend).observe(document.body, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ["open"],
        });
      }

      window.addEventListener("load", scheduleSend);
      window.addEventListener("resize", scheduleSend);
      if (document.fonts?.ready) {
        document.fonts.ready.then(scheduleSend).catch(() => {});
      }
      scheduleSend();
    </script>
